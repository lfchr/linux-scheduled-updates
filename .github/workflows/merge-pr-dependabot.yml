name: auto-merge dependabot pr

on: pull_request_target

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'lfchr/linux-scheduled-updates'
    steps:
      - name: dependabot
        uses: dependabot/fetch-metadata@v3
      - name: merge
        run: gh pr merge -m "${{github.event.pull_request.html_url}}"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
